<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Atlas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>HISTORY <span class="accent">ATLAS</span></h1>
            <p class="subtitle">World Population Timeline</p>
        </div>
        <div class="header-right">
            <div class="year-display" id="yearDisplay">3000 BC</div>
        </div>
    </div>
    
    <div class="container">
        <div id="map"></div>
        <div class="info-panel">
            <div class="stat-card">
                <div class="stat-label">WORLD POPULATION</div>
                <div class="stat-value" id="populationDisplay">~14M</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">ERA</div>
                <div class="stat-value small" id="eraDisplay">Bronze Age</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">REGIONS</div>
                <div class="stat-value small" id="regionCount">4</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">SCALE</div>
                <div class="stat-value tiny" id="dotScale">1 dot = 20K</div>
            </div>
            <div class="divider"></div>
            <div class="region-list" id="regionStats"></div>
        </div>
    </div>
    
    <div class="timeline-container">
        <div class="timeline-year-label" id="sliderYearLabel">3000 BC</div>
        <input type="range" id="timelineSlider" class="timeline-slider" min="0" max="1000" value="0">
        <div class="timeline-markers">
            <span>3000 BC</span>
            <span>1000 BC</span>
            <span>1 AD</span>
            <span>1000 AD</span>
            <span>1500</span>
            <span>1800</span>
            <span>1900</span>
            <span>1950</span>
            <span>2000</span>
            <span>2025</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js?v=10"></script>
    <script src="app.js?v=10"></script>
</body>
</html>
